name: Build

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
  workflow_call:
    inputs:
      ref:
        required: true
        type: string
      attestations:
        required: true
        type: boolean

permissions:
  contents: read # Required for checkout
  attestations: write # Required for attestations
  id-token: write # Required for OIDC

jobs:
  grammar-textmate:
    name: Grammar (TextMate)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: grammars/textmate/python-markdown

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref || github.sha }}

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: grammars/textmate/python-markdown/package-lock.json

      - name: Install dependencies
        run: npm install

      - name: Run tests
        run: npm test

  integration-code:
    name: Integration (Code)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: integrations/code

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref || github.sha }}

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: integrations/code/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build artifact
        run: npm run build && npx vsce package

      - name: Create artifact attestation
        if: inputs.attestations == true
        uses: actions/attest@v4
        with:
          show-summary: false
          subject-path: integrations/code/*

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: integration-code
          path: integrations/code/*.vsix
